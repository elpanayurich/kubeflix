apiVersion: apps/v1
kind: Deployment
metadata:
  name: payments-dep
spec:
  replicas: 1
  selector:
    matchLabels:
      app: payments-api
  template:
    metadata:
      labels:
        app: payments-api
    spec:
      containers:
      - name: payments-container
        image: kubeflix-payments:v3
        imagePullPolicy: Never
---
apiVersion: v1
kind: Service
metadata:
  name: payments-service
spec:
  selector:
    app: payments-api
  ports:
    - protocol: TCP
      port: 80
      targetPort: 5000
  type: ClusterIP