<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KubeFlix - Registro</title>
    <link rel="stylesheet" href="/style.css">
</head>
<body>
    <div class="container">
        <h1>KubeFlix</h1>
        <div class="login-container">
            <h3>Crea tu cuenta</h3>
            <input type="text" id="reg-username" placeholder="Usuario">
            <input type="password" id="reg-password" placeholder="Contraseña">
            <button id="registerBtn">Registrarse</button>
            <p>¿Ya tienes cuenta? <a href="/login" class="toggle-link">Inicia sesión.</a></p>
            <p id="message"></p>
        </div>
    </div>
    <script src="/script.js?v=final"></script>
</body>
</html>
