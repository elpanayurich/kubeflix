apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: kubeflix-ingress
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /$1
spec:
  rules:
  - host: kubeflix.local
    http:
      paths:
      - path: /login(.*)
        pathType: Prefix
        backend:
          service:
            name: frontend-service
            port: { number: 80 }
      - path: /register(.*)
        pathType: Prefix
        backend:
          service:
            name: frontend-service
            port: { number: 80 }
      - path: /api/(.*)
        pathType: Prefix
        backend:
          service:
            name: search-service
            port: { number: 80 }
      - path: /(.*)
        pathType: Prefix
        backend:
          service:
            name: frontend-service
            port: { number: 80 }