apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: kubeflix-ingress
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "false"
spec:
  rules:
  - host: kubeflix.local
    http:
      paths:
      # 1. Authentication Traffic
      - path: /auth
        pathType: Prefix
        backend:
          service:
            name: auth-service
            port: 
              number: 80
              
      # 2. Search Traffic
      - path: /api
        pathType: Prefix
        backend:
          service:
            name: search-service
            port: 
              number: 80

      # 3. Payments Traffic (Upgrade)
      - path: /upgrade
        pathType: Prefix
        backend:
          service:
            name: payments-service
            port: 
              number: 80

      # 4. Payments Traffic (Downgrade)
      - path: /downgrade
        pathType: Prefix
        backend:
          service:
            name: payments-service
            port: 
              number: 80
              
      # 5. Catch-all for Frontend (Web HTML/CSS/JS)
      - path: /
        pathType: Prefix
        backend:
          service:
            name: frontend-service
            port: 
              number: 80