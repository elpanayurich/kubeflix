apiVersion: apps/v1
kind: Deployment
metadata:
  name: search-dep
spec:
  replicas: 2
  selector:
    matchLabels:
      app: search-api
  template:
    metadata:
      labels:
        app: search-api
    spec:
      containers:
      - name: search-container
        image: kubeflix-search:v21
        ports:
        - containerPort: 5000
        readinessProbe:
          tcpSocket:
            port: 5000
          initialDelaySeconds: 2
          periodSeconds: 5
        env:
          - name: ADMIN_PASSWORD
            valueFrom:
              secretKeyRef:
                name: search-api-secret
                key: admin-pass
---
apiVersion: v1
kind: Service
metadata:
  name: search-service
spec:
  selector:
    app: search-api
  ports:
    - protocol: TCP
      port: 80
      targetPort: 5000
  type: LoadBalancer